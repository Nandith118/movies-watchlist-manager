{% extends "base.html" %}
{% block content %}
<h2>Add Media</h2>
<form method="post">
  <div class="mb-2"><label>Title</label><input class="form-control" name="title" required></div>
  <div class="mb-2"><label>Type</label>
    <select name="media_type" class="form-select"><option>Movie</option><option>Series</option></select></div>
  <div class="mb-2"><label>Year</label><input class="form-control" name="release_year" type="number"></div>
  <div class="mb-2"><label>IMDB rating</label><input class="form-control" name="imdb_rating" type="number" step="0.1"></div>
  <div class="mb-2">
  <label>Image URL</label>
  <input class="form-control" name="image_url" type="text" placeholder="e.g. kantara.jpg or https://example.com/image.jpg" required>
</div>

  <div class="mb-2"><label>Description</label><textarea class="form-control" name="description" rows="4"></textarea></div>
  <button class="btn btn-primary">Add</button>
</form>
{% endblock %}
