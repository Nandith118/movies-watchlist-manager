{% extends "base.html" %}
{% block content %}
<h2>Media Library</h2>
<table class="table table-striped">
  <thead><tr><th>ID</th><th>Title</th><th>Type</th><th>Year</th><th>IMDB</th></tr></thead>
  <tbody>
    {% for m in data %}
    <tr>
      <td>{{ m[0] }}</td>
      <td><a href="{{ url_for('media_detail', mid=m[0]) }}">{{ m[1] }}</a></td>
      <td>{{ m[2] }}</td>
      <td>{{ m[3] }}</td>
      <td>{{ m[4] or '-' }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
